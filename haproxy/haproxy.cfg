global
    maxconn 256

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http-in
    bind *:5000
    default_backend backends

backend backends
    balance roundrobin
    server b1 backend1:5000 check
    server b2 backend2:5000 check
    server b3 backend3:5000 check