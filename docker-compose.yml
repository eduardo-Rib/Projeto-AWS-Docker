version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: finances_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finances_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend1: &backend_service
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@db:5432/finances_db
    depends_on:
      db:
        condition: service_healthy

  backend2:
    <<: *backend_service

  backend3:
    <<: *backend_service

  haproxy:
    image: haproxy:2.4
    restart: unless-stopped
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000"
    depends_on:
      - backend1
      - backend2
      - backend3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"