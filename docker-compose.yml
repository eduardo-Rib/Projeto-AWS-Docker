version: '3.8'

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - SERVERURL=ec2-18-212-75-31.compute-1.amazonaws.com
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=1.1.1.1
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: finances_db
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finances_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend1: &backend_service
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@db:5432/finances_db
    depends_on:
      db:
        condition: service_healthy

  backend2:
    <<: *backend_service

  backend3:
    <<: *backend_service

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend1
      - backend2
      - backend3

  haproxy:
    image: haproxy:2.4
    restart: unless-stopped
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "10.13.13.1:80:80"
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3